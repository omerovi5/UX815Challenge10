<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JSONPlaceholder Explorer</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      background: #f5f5f5;
      color: #1a1a1a;
    }

    h1 { margin-bottom: 0.25rem; }
    p.subtitle { color: #666; margin-bottom: 1.5rem; }

    /* Tab bar */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .tabs button {
      padding: 8px 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    .tabs button.active {
      background: #1a1a2e;
      color: #fff;
      border-color: #1a1a2e;
    }

    /* Cards */
    #output {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 14px 16px;
    }

    .card .meta  { font-size: 11px; color: #999; margin-bottom: 6px; }
    .card .title { font-size: 14px; font-weight: 600; margin-bottom: 6px; text-transform: capitalize; }
    .card .body  { font-size: 13px; color: #555; line-height: 1.5; }
  </style>
</head>
<body>

  <h1>JSONPlaceholder Explorer</h1>
  <p class="subtitle">Browsing fake data from jsonplaceholder.typicode.com</p>

  <div class="tabs">
    <button class="active" onclick="load('posts')">Posts</button>
    <button onclick="load('users')">Users</button>
    <button onclick="load('todos')">Todos</button>
    <button onclick="load('comments')">Comments</button>
    <button onclick="load('albums')">Albums</button>
  </div>

  <div id="output">Loading…</div>

  <script>
    async function load(resource) {
      // Mark active tab
      document.querySelectorAll('.tabs button').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase() === resource);
      });

      document.getElementById('output').textContent = 'Loading…';

      const res  = await fetch(`https://jsonplaceholder.typicode.com/${resource}`);
      const data = await res.json();

      const output = document.getElementById('output');
      output.innerHTML = '';

      data.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = buildCard(item, resource);
        output.appendChild(card);
      });
    }

    function buildCard(item, resource) {
      if (resource === 'posts')
        return `<div class="meta">#${item.id} · User ${item.userId}</div>
                <div class="title">${item.title}</div>
                <div class="body">${item.body}</div>`;

      if (resource === 'users')
        return `<div class="title">${item.name}</div>
                <div class="body">@${item.username}<br>${item.email}<br>${item.address.city}</div>`;

      if (resource === 'todos')
        return `<div class="meta">${item.completed ? '✅ Done' : '⏳ Pending'} · User ${item.userId}</div>
                <div class="title">${item.title}</div>`;

      if (resource === 'comments')
        return `<div class="meta">Post #${item.postId}</div>
                <div class="title">${item.name}</div>
                <div class="body">${item.email}<br>${item.body}</div>`;

      if (resource === 'albums')
        return `<div class="meta">#${item.id} · User ${item.userId}</div>
                <div class="title">${item.title}</div>`;
    }

    load('posts');
  </script>

</body>
</html>
